<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHOXA Dashboard</title>
    <!-- We load Tailwind CSS here, which the App.js component uses for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Ensure the body and root container take up full screen height */
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
      }
    </style>
</head>
<body class="bg-[#FDF6E3]">
    <!-- This is the DOM element where our React app will be injected -->
    <div id="root"></div>
</body>
</html>
